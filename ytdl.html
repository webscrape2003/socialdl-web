<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch | VajiraOfficial Ytdl</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.4);
            --bg: #0d0e12;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1a1a1a, #000);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area h2 { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; }

        .input-section { margin-bottom: 25px; display: flex; flex-direction: column; gap: 12px; }
        
        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 18px;
            color: white;
            text-align: center;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        #fetchBtn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.3);
            transition: 0.3s;
        }
        #fetchBtn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- NEW SEARCH GRID STYLES --- */
        #searchArea { display: none; flex-direction: column; gap: 12px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .search-card { 
            display: flex; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; 
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s; align-items: center;
        }
        .search-card:hover { border-color: var(--accent); background: rgba(255,45,85,0.05); }
        .search-thumb { width: 100px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; }
        .search-info { flex: 1; }
        .search-title { font-size: 0.8rem; font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .search-meta { font-size: 0.65rem; color: var(--text-dim); }

        /* --- BANK PAYMENT SECTION --- */
        .bank-card {
            margin-top: 25px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px dashed var(--border);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .bank-card::before {
            content: 'PREMIUM SUPPORT';
            position: absolute;
            top: 10px;
            right: -20px;
            background: var(--accent);
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 30px;
            transform: rotate(45deg);
        }
        .bank-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: var(--accent); font-size: 0.9rem; font-weight: 700; }
        .bank-details { display: flex; flex-direction: column; gap: 8px; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .detail-label { color: var(--text-dim); }
        .detail-value { color: #fff; font-weight: 600; }
        .acc-number-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }
        .acc-number-box:hover { border-color: var(--accent); background: rgba(255, 45, 85, 0.05); }

        /* --- BEAUTIFUL PLAYER --- */
        #resultArea { display: none; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .player-frame {
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden;
            border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow); margin-bottom: 15px;
        }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }
        .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; line-height: 1.4; text-align: left; }
        .stats { display: flex; gap: 8px; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 20px; flex-wrap: wrap; }
        .stats span { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 8px; font-weight: 600; border: 1px solid var(--border); }
        .format-selection { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 15px; }
        .sel-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .sel-btn.active { background: var(--accent); box-shadow: 0 5px 15px var(--accent-glow); }
        .dl-list { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dl-list.active { display: grid; }
        .dl-item {
            background: rgba(255,255,255,0.07); padding: 15px; border-radius: 18px;
            text-decoration: none; color: white; text-align: center; font-size: 0.85rem;
            font-weight: 700; border: 1px solid var(--border); transition: 0.2s;
        }
        .dl-item:hover { border-color: var(--accent); background: rgba(255, 45, 85, 0.15); transform: scale(1.02); }
        .dl-item span { display: block; font-size: 0.65rem; opacity: 0.6; margin-top: 4px; text-transform: uppercase; }
        #loader { display: none; color: var(--accent); font-weight: 800; margin: 15px 0; text-align: center; letter-spacing: 1px; }
        footer { text-align: center; padding: 10px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; }
        footer span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-area">
            <h2>VajiraOfficial <span style="color:var(--accent)">Ytdl</span></h2>
        </div>
        
        <div class="input-section">
            <input type="text" id="urlInput" placeholder="YouTube URL or Song Name...">
            <button id="fetchBtn">FETCH CONTENT</button>
        </div>

        <div id="loader">⚡ PROCESSING...</div>

        <div id="searchArea"></div>

        <div id="resultArea">
            <button onclick="backToSearch()" id="backBtn" style="display:none; background:none; border:none; color:var(--accent); font-weight:700; font-size:0.7rem; cursor:pointer; margin-bottom:10px;">← BACK TO SEARCH</button>
            <div class="player-frame">
                <video id="vidPlayer" controls></video>
            </div>
            <div id="vidTitle" class="title"></div>
            <div class="stats">
                <span id="vidAuthor"></span>
                <span id="vidViews"></span>
                <span id="vidAgo"></span>
                <span id="vidTime"></span>
            </div>
            <div class="format-selection">
                <button class="sel-btn active" id="btnVid" onclick="toggleDisplay('video')">VIDEO (MP4)</button>
                <button class="sel-btn" id="btnAud" onclick="toggleDisplay('audio')">AUDIO (MP3)</button>
            </div>
            <div id="videoList" class="dl-list active"></div>
            <div id="audioList" class="dl-list"></div>
        </div>
    </div>

    <div class="bank-card" style="width: 100%; max-width: 480px;">
        <div class="bank-header"><i class="fa-solid fa-crown"></i> GET PREMIUM ACCESS</div>
        <div class="bank-details">
            <div class="detail-row"><span class="detail-label">Price</span><span class="detail-value">LKR 500.00</span></div>
            <div class="detail-row"><span class="detail-label">Bank</span><span class="detail-value">Bank of Ceylon</span></div>
            <div class="detail-row"><span class="detail-label">Holder</span><span class="detail-value">MR W M V RATHNAYAKA</span></div>
            <div class="acc-number-box" onclick="copyAccountNumber()">
                <span id="accNum" style="font-weight: 800;">0089860809</span>
                <i class="fa-regular fa-copy" style="color:var(--accent)"></i>
            </div>
            <a href="https://wa.me/94719199757" target="_blank" style="text-decoration: none; margin-top: 10px;">
                <button style="width: 100%; background: rgba(37, 211, 102, 0.1); border: 1px solid #25D366; color: #25D366; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer;">CONTACT OWNER</button>
            </a>
            <div id="copyStatus" style="display:none; text-align:center; font-size:0.7rem; color:var(--accent); margin-top:8px;">✅ Copied!</div>
        </div>
    </div>

    <footer>Powered by: Vajira <span>Rathnayaka</span></footer>

    <script>
        const SEARCH_API = "vajira-o0oujlyn32-1771089291985";
        const DOWNLOAD_API = "vajira-1qg3lqmr60-1768268975394";

        function toggleDisplay(type) {
            document.getElementById('videoList').classList.toggle('active', type === 'video');
            document.getElementById('audioList').classList.toggle('active', type === 'audio');
            document.getElementById('btnVid').classList.toggle('active', type === 'video');
            document.getElementById('btnAud').classList.toggle('active', type === 'audio');
        }

        function copyAccountNumber() {
            navigator.clipboard.writeText(document.getElementById('accNum').innerText);
            const status = document.getElementById('copyStatus');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const query = document.getElementById('urlInput').value.trim();
            if(!query) return alert("Please enter something!");

            if(query.includes("youtube.com") || query.includes("youtu.be")) {
                loadDownloadLinks(query);
            } else {
                fetchSearch(query);
            }
        });

        async function fetchSearch(q) {
            const loader = document.getElementById('loader');
            const searchArea = document.getElementById('searchArea');
            const resultArea = document.getElementById('resultArea');
            
            loader.style.display = "block";
            searchArea.style.display = "none";
            resultArea.style.display = "none";

            try {
                const res = await fetch(`https://vajira-official-apis.vercel.app/api/ytsearch?apikey=${SEARCH_API}&q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if(data.status) {
                    searchArea.innerHTML = "";
                    data.results.forEach(vid => {
                        searchArea.innerHTML += `
                            <div class="search-card" onclick="loadDownloadLinks('${vid.url}')">
                                <img src="${vid.media.thumbnail}" class="search-thumb">
                                <div class="search-info">
                                    <div class="search-title">${vid.title}</div>
                                    <div class="search-meta">${vid.author.name} • ${vid.description.duration}</div>
                                </div>
                            </div>
                        `;
                    });
                    loader.style.display = "none";
                    searchArea.style.display = "flex";
                }
            } catch (err) { alert("Search Error"); loader.style.display = "none"; }
        }

        async function loadDownloadLinks(url) {
            const loader = document.getElementById('loader');
            const searchArea = document.getElementById('searchArea');
            const resultArea = document.getElementById('resultArea');
            const backBtn = document.getElementById('backBtn');
            
            loader.style.display = "block";
            searchArea.style.display = "none";
            resultArea.style.display = "none";

            try {
                const [vRes, aRes] = await Promise.all([
                    fetch(`https://vajira-official-apis.vercel.app/api/ytmp4?apikey=${DOWNLOAD_API}&url=${encodeURIComponent(url)}`).then(r => r.json()),
                    fetch(`https://vajira-official-apis.vercel.app/api/ytmp3?apikey=${DOWNLOAD_API}&url=${encodeURIComponent(url)}`).then(r => r.json())
                ]);

                if (vRes.status) {
                    const meta = vRes.metadata;
                    document.getElementById('vidPlayer').src = vRes.downloads.video[0].url;
                    document.getElementById('vidPlayer').poster = meta.thumbnails.max || meta.thumbnails.image;
                    document.getElementById('vidTitle').innerText = meta.title;
                    document.getElementById('vidAuthor').innerText = meta.author.name;
                    document.getElementById('vidViews').innerText = meta.viewsFormatted + " views";
                    document.getElementById('vidAgo').innerText = meta.ago;
                    document.getElementById('vidTime').innerText = meta.duration.timestamp;

                    const vList = document.getElementById('videoList');
                    vList.innerHTML = "";
                    vRes.downloads.video.forEach(dl => {
                        vList.innerHTML += `<a href="${dl.url}" class="dl-item" target="_blank">${dl.quality}<span>${dl.format}</span></a>`;
                    });

                    const aList = document.getElementById('audioList');
                    aList.innerHTML = "";
                    aRes.data.downloads.forEach(dl => {
                        aList.innerHTML += `<a href="${dl.url}" class="dl-item" target="_blank">${dl.bitrate}<span>${dl.format}</span></a>`;
                    });

                    loader.style.display = "none";
                    resultArea.style.display = "block";
                    backBtn.style.display = "block";
                }
            } catch (err) { alert("Download API Error"); loader.style.display = "none"; }
        }

        function backToSearch() {
            document.getElementById('resultArea').style.display = "none";
            document.getElementById('searchArea').style.display = "flex";
        }
    </script>
</body>
</html>
