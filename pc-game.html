<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vajira Game Hub | PC Game DB</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff00ea;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a1b2e, #0a0b10);
            min-height: 100vh;
        }

        /* --- Header & Search --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        input {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            width: 400px;
            backdrop-filter: blur(10px);
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        button {
            background: var(--primary);
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }

        /* --- Grid & Cards --- */
        #gameGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .card h3 { font-size: 1.1rem; margin-bottom: 10px; color: var(--primary); }
        .card p { font-size: 0.8rem; opacity: 0.7; }

        /* --- Details Overlay --- */
        #detailsPage {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: none;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .details-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn { margin-bottom: 20px; background: #333; }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .screenshot-grid img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tag {
            display: inline-block;
            background: var(--accent);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            margin: 5px;
        }

        .download-box {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .loader {
            display: none;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="mainPage" class="container">
    <header>
        <h1>VAJIRA GAME HUB</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search PC games (e.g. GTA, Cyberpunk)...">
            <button onclick="searchGames()">SEARCH</button>
        </div>
        <div id="loader" class="loader">SCANNING DATABASE...</div>
    </header>

    <div id="gameGrid"></div>
</div>

<div id="detailsPage">
    <div class="details-container">
        <button class="back-btn" onclick="closeDetails()">← BACK TO SEARCH</button>
        <div id="detailsContent"></div>
    </div>
</div>

<script>
    const API_KEY = 'mrhansamala-pcGAME-DB-FreeYRLKK1';
    const BASE_URL = 'https://pc-game-db.vercel.app/api';

    async function searchGames() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        toggleLoader(true);
        try {
            const response = await axios.get(`${BASE_URL}/search?q=${query}&key=${API_KEY}`);
            renderGrid(response.data);
        } catch (error) {
            console.error("Search failed", error);
        }
        toggleLoader(false);
    }

    function renderGrid(games) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = games.map(game => `
            <div class="card" onclick="viewDetails('${game.link}')">
                <h3>${game.title}</h3>
                <p>Release: ${game.date}</p>
                <p>Uploader: ${game.author}</p>
            </div>
        `).join('');
    }

    async function viewDetails(url) {
        toggleLoader(true);
        try {
            const response = await axios.get(`${BASE_URL}/info?url=${url}&key=${API_KEY}`);
            const game = response.data;
            
            document.getElementById('detailsContent').innerHTML = `
                <h1 style="text-align:left">${game.title}</h1>
                <div>
                    ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                
                <div class="screenshot-grid">
                    ${game.screenshots.map(src => `<img src="${src}" alt="screenshot">`).join('')}
                </div>

                <div class="download-box">
                    <h2>Downloads</h2>
                    <p>Select a provider to view parts:</p>
                    ${game.torrents.map(t => `
                        <div style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                            <strong>${t.text}</strong><br>
                            ${t.links.slice(0, 3).map(l => `<a href="${l.link}" target="_blank" style="color:var(--primary); margin-right:10px; text-decoration:none;">[${l.text}]</a>`).join('')}
                            ${t.links.length > 3 ? '...' : ''}
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('mainPage').style.display = 'none';
        } catch (error) {
            alert("Error loading details. Try again.");
        }
        toggleLoader(false);
    }

    function closeDetails() {
        document.getElementById('detailsPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
    }

    function toggleLoader(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
    }
</script>

</body>
</html>
