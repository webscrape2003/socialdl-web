<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC GAME HUB | VAJIRA OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #06070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #06070a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Header & Search */
        header { text-align: center; margin-bottom: 50px; }
        .logo { 
            font-size: 3rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px var(--primary);
        }
        .logo span { color: var(--primary); }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 30px auto;
        }

        input#searchInput {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            outline: none;
        }

        input#searchInput:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: #000;
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .game-card:hover {
            background: rgba(0, 242, 255, 0.05);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .game-card h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #fff; line-height: 1.4; }
        .game-card .meta { font-size: 0.85rem; color: #888; display: flex; gap: 15px; }
        .meta i { color: var(--primary); margin-right: 5px; }

        /* Modal Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: #111218;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #666; }
        .close-btn:hover { color: #fff; }

        /* Detail Elements */
        .tag { background: var(--secondary); color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.75rem; margin-right: 8px; text-transform: uppercase; }
        .screenshot-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 25px 0; }
        .screenshot-container img { width: 100%; border-radius: 10px; border: 1px solid #333; }

        .download-list { margin-top: 30px; }
        .dl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #00f2ff, #7000ff);
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            margin: 10px 10px 0 0;
            width: 100%;
        }

        .dl-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(112, 0, 255, 0.4); }

        /* Loader */
        .loader { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="logo">VAJIRA<span> GAME</span></h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Enter game name (e.g. GTA 5)..." onkeypress="if(event.key === 'Enter') searchGames()">
                <button class="search-btn" onclick="searchGames()"><i class="fas fa-search"></i></button>
            </div>
        </header>

        <div id="gameGrid" class="game-grid">
            </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script>
        const API_KEY = "mrhansamala-pcGAME-DB-FreeYRLKK1";
        const BASE_SEARCH = "https://pc-game-db.vercel.app/api/search";
        const BASE_INFO = "https://pc-game-db.vercel.app/api/info";

        async function searchGames() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('gameGrid');
            
            if(!query) return;

            grid.innerHTML = '<div class="loader"><i class="fas fa-circle-notch fa-spin"></i> SCANNING DATABASE...</div>';

            try {
                const response = await fetch(`${BASE_SEARCH}?q=${encodeURIComponent(query)}&key=${API_KEY}`);
                const results = await response.json();

                grid.innerHTML = '';

                if(results.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; width:100%;">No games found for that search.</p>';
                    return;
                }

                results.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => showDetails(game.link);
                    card.innerHTML = `
                        <h3>${game.title}</h3>
                        <div class="meta">
                            <span><i class="far fa-calendar-alt"></i> ${game.date}</span>
                            <span><i class="far fa-user"></i> ${game.author}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                grid.innerHTML = '<p style="color:red; text-align:center;">Network Error. Check console.</p>';
            }
        }

        async function showDetails(url) {
            const modal = document.getElementById('gameModal');
            const body = document.getElementById('modalBody');
            
            modal.style.display = "block";
            body.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> RETRIEVING DATA...</div>';

            try {
                const response = await fetch(`${BASE_INFO}?url=${encodeURIComponent(url)}&key=${API_KEY}`);
                const data = await response.json();

                const tags = data.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const screens = data.screenshots.slice(0, 4).map(s => `<img src="${s}">`).join('');
                
                // Extracting magnet link if available
                let magnetLink = '';
                data.torrents.forEach(t => {
                    const found = t.links.find(l => l.text.toLowerCase().includes('magnet'));
                    if(found) magnetLink = found.link;
                });

                body.innerHTML = `
                    <h2 style="color: var(--primary); margin-top:0;">${data.title}</h2>
                    <div style="margin-bottom: 20px;">${tags}</div>
                    
                    <div class="meta" style="margin-bottom:20px;">
                        <span><i class="fas fa-user-edit"></i> ${data.meta.author}</span>
                        <span><i class="fas fa-clock"></i> ${data.meta.date}</span>
                    </div>

                    <h4 style="border-left: 3px solid var(--primary); padding-left:10px;">SCREENSHOTS</h4>
                    <div class="screenshot-container">${screens}</div>

                    <div class="download-list">
                        ${magnetLink ? `
                            <a href="${magnetLink}" class="dl-btn">
                                <i class="fas fa-magnet" style="margin-right:10px;"></i> 
                                DOWNLOAD TORRENT (MAGNET)
                            </a>
                        ` : '<p>Magnet link not directly available. Check original source.</p>'}
                        
                        <a href="${url}" target="_blank" class="dl-btn" style="background: transparent; border: 1px solid #444;">
                            <i class="fas fa-external-link-alt" style="margin-right:10px;"></i>
                            VIEW ORIGINAL REPACK PAGE
                        </a>
                    </div>
                `;

            } catch (err) {
                body.innerHTML = '<p>Failed to load game details.</p>';
            }
        }

        function closeModal() {
            document.getElementById('gameModal').style.display = "none";
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('gameModal')) closeModal();
        }
    </script>
</body>
</html>
