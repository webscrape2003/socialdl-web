<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault | PC Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #00ffcc; /* Cyber Neon Green */
            --bg: #0a0a0b;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #a3a3a3;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Search Header */
        .header {
            text-align: center;
            padding: 40px 0;
            background: radial-gradient(circle at center, rgba(0, 255, 204, 0.1) 0%, transparent 70%);
        }

        .search-box {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 20px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            outline: none;
            font-size: 1rem;
        }

        button#searchBtn {
            background: var(--accent);
            border: none;
            color: black;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        button#searchBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }

        /* Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        .game-card h3 { font-size: 0.95rem; margin: 15px 0 5px 0; line-height: 1.4; }
        .game-card span { color: var(--text-dim); font-size: 0.8rem; }

        /* Details View */
        #detailView { display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .tag {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-right: 5px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .screenshot-reel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: thin;
        }

        .screenshot-reel img { height: 180px; border-radius: 12px; border: 1px solid var(--border); }

        .link-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dl-btn {
            background: white;
            color: black;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .back-btn { color: var(--text-dim); cursor: pointer; margin-bottom: 20px; display: block; }

        #loader { display: none; text-align: center; color: var(--accent); font-weight: 800; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="searchView">
        <div class="header">
            <i class="fa-solid fa-gamepad" style="font-size: 3rem; color: var(--accent);"></i>
            <h1>GAME <span style="color:var(--accent)">VAULT</span></h1>
            <div class="search-box">
                <input type="text" id="gameInput" placeholder="Search PC Repacks (e.g. GTA)...">
                <button id="searchBtn">INITIALIZE</button>
            </div>
        </div>
        <div id="loader">SEARCHING DATABASE...</div>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div id="detailView">
        <div class="back-btn" onclick="closeDetails()"><i class="fa-solid fa-chevron-left"></i> BACK TO DATABASE</div>
        <h1 id="gTitle" style="color: var(--accent);"></h1>
        <div id="gTags"></div>
        
        <div class="screenshot-reel" id="gScreens"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div>
                <h3><i class="fa-solid fa-circle-info"></i> Repack Info</h3>
                <p id="gMeta" style="color: var(--text-dim); line-height: 1.6;"></p>
            </div>
            <div>
                <h3><i class="fa-solid fa-download"></i> Access Links</h3>
                <div id="gLinks"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const KEY = "mrhansamala-pcGAME-DB-FreeYRLKK1";
    const BASE_URL = "https://pc-game-db.vercel.app/api";

    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('gameInput').value;
        if(!query) return;

        toggleLoader(true);
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";

        try {
            const res = await fetch(`${BASE_URL}/search?q=${encodeURIComponent(query)}&key=${KEY}`);
            const data = await res.json();

            data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <span>${game.date}</span>
                    <h3>${game.title}</h3>
                    <small style="color:var(--accent)">By ${game.author}</small>
                `;
                card.onclick = () => fetchGameDetails(game.link);
                grid.appendChild(card);
            });
        } catch (e) { alert("Database error"); }
        toggleLoader(false);
    });

    async function fetchGameDetails(url) {
        toggleLoader(true);
        try {
            const res = await fetch(`${BASE_URL}/info?url=${encodeURIComponent(url)}&key=${KEY}`);
            const g = await res.json();

            document.getElementById('gTitle').innerText = g.title;
            
            // Tags
            document.getElementById('gTags').innerHTML = g.tags.map(t => `<span class="tag">${t}</span>`).join('');

            // Screenshots
            document.getElementById('gScreens').innerHTML = g.screenshots.map(s => `<img src="${s}">`).join('');

            // Meta
            document.getElementById('gMeta').innerHTML = `
                Date: ${g.meta.date}<br>
                Uploader: ${g.meta.author}<br><br>
                ${g.description.join('<br>')}
            `;

            // Links (Torrents/Magnets)
            document.getElementById('gLinks').innerHTML = g.torrents.map(t => {
                // Find magnet or first primary link
                const mainLink = t.links.find(l => l.text.includes('magnet')) || t.links[0];
                return `
                    <div class="link-box">
                        <span>${t.text.split('|')[0]}</span>
                        <a href="${mainLink.link}" class="dl-btn" target="_blank">GET LINK</a>
                    </div>
                `;
            }).join('');

            document.getElementById('searchView').style.display = "none";
            document.getElementById('detailView').style.display = "block";
            window.scrollTo(0,0);
        } catch (e) { alert("Details fetch failed"); }
        toggleLoader(false);
    }

    function closeDetails() {
        document.getElementById('searchView').style.display = "block";
        document.getElementById('detailView').style.display = "none";
    }

    function toggleLoader(show) {
        document.getElementById('loader').style.display = show ? "block" : "none";
    }
</script>

</body>
</html>
