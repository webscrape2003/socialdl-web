<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAJIRA | PRO GAME HUB</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff00ea;
            --bg: #05060a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: #e0e0e0;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- Header Section --- */
        header { text-align: center; padding: 60px 0 40px; }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
            margin: 0;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 40px auto;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 2px solid var(--border);
            padding: 15px 25px;
            border-radius: 5px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            backdrop-filter: blur(15px);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-search {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-search:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
        }

        /* --- Grid Section --- */
        #gameGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding-top: 20px;
        }

        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: scale(1.03);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transition: 0.5s;
        }

        .game-card:hover::before { left: 100%; }

        .game-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            color: var(--primary);
            line-height: 1.4;
        }

        .meta-info { font-size: 0.9rem; color: #aaa; margin: 5px 0; }
        .meta-info b { color: var(--accent); }

        /* --- Details Page --- */
        #detailsOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 50px 0;
        }

        .details-wrapper { max-width: 900px; margin: 0 auto; padding: 20px; }

        .back-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 30px;
            font-family: 'Orbitron';
        }

        .screenshot-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .screenshot-container img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .screenshot-container img:hover { border-color: var(--accent); transform: scale(1.05); }

        .dl-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            padding: 25px;
            border-radius: 10px;
        }

        .dl-link {
            display: inline-block;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 15px;
            margin: 5px;
            color: var(--primary);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .dl-link:hover { background: var(--primary); color: #000; }

        .status-msg { text-align: center; font-size: 1.5rem; margin-top: 50px; color: var(--accent); display: none;}
    </style>
</head>
<body>

<div id="homePage" class="container">
    <header>
        <h1 class="logo">VAJIRA CORE</h1>
        <p style="letter-spacing: 3px; opacity: 0.6;">PREMIUM GAME REPOSITORY</p>
        
        <div class="search-container">
            <input type="text" id="gameSearch" placeholder="Enter game title (e.g. Grand Theft Auto)...">
            <button class="btn-search" onclick="performSearch()">FETCH</button>
        </div>
    </header>

    <div id="status" class="status-msg">NO GAMES FOUND. TRY ANOTHER QUERY.</div>
    <div id="gameGrid"></div>
</div>

<div id="detailsOverlay">
    <div class="details-wrapper">
        <button class="back-btn" onclick="hideDetails()">[ BACK TO HUB ]</button>
        <div id="detailsContent"></div>
    </div>
</div>

<script>
    const KEY = 'mrhansamala-pcGAME-DB-FreeYRLKK1';
    const API_BASE = 'https://pc-game-db.vercel.app/api';

    // Enter Key Support
    document.getElementById('gameSearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });

    async function performSearch() {
        const query = document.getElementById('gameSearch').value;
        const grid = document.getElementById('gameGrid');
        const status = document.getElementById('status');

        if (!query) return;

        grid.innerHTML = '';
        status.style.display = 'none';
        
        try {
            const res = await axios.get(`${API_BASE}/search?q=${encodeURIComponent(query)}&key=${KEY}`);
            const games = res.data;

            if (!games || games.length === 0) {
                status.style.display = 'block';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => showDetails(game.link);
                card.innerHTML = `
                    <h3>${game.title}</h3>
                    <div class="meta-info"><b>RELEASE:</b> ${game.date || 'Unknown'}</div>
                    <div class="meta-info"><b>UPLOADER:</b> ${game.author || 'FitGirl'}</div>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            console.error(err);
            status.innerText = "CONNECTION ERROR. CHECK API KEY.";
            status.style.display = 'block';
        }
    }

    async function showDetails(gameUrl) {
        const content = document.getElementById('detailsContent');
        const overlay = document.getElementById('detailsOverlay');
        
        content.innerHTML = `<h2 style="color:var(--primary); text-align:center;">DECRYPTING DATA...</h2>`;
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';

        try {
            const res = await axios.get(`${API_BASE}/info?url=${encodeURIComponent(gameUrl)}&key=${KEY}`);
            const d = res.data;

            content.innerHTML = `
                <h1 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:10px;">${d.title}</h1>
                <p style="color:var(--accent)">${d.tags ? d.tags.join(' • ') : 'PC GAME'}</p>
                
                <div class="screenshot-container">
                    ${d.screenshots.slice(0, 6).map(img => `<img src="${img}" onerror="this.style.display='none'">`).join('')}
                </div>

                <div class="dl-section">
                    <h2 style="font-family:'Orbitron'; font-size:1.2rem; border-bottom:1px solid var(--border); padding-bottom:10px;">AVAILABLE LINKS</h2>
                    ${d.torrents.map(t => `
                        <div style="margin-top:20px;">
                            <p style="font-weight:bold; color:#fff;">${t.text.split('\n')[0]}</p>
                            <div>
                                ${t.links.map(l => `<a href="${l.link}" target="_blank" class="dl-link">${l.text}</a>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        } catch (err) {
            content.innerHTML = `<h2 style="color:red;">FAILED TO LOAD DETAILS.</h2>`;
        }
    }

    function hideDetails() {
        document.getElementById('detailsOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
