<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAJIRA CORE | GAME HUB</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff00ea;
            --bg: #030508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.15);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            background-image: linear-gradient(to bottom, rgba(112,0,255,0.05) 1px, transparent 1px), linear-gradient(to right, rgba(112,0,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        /* --- Header --- */
        header { text-align: center; padding: 50px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .logo { font-family: 'Orbitron'; font-size: 2.8rem; letter-spacing: 5px; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }
        
        .search-box {
            display: flex; max-width: 700px; margin: 30px auto; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--border);
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1.1rem; outline: none; }
        .btn-fetch { background: var(--primary); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-fetch:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }

        /* --- Grid --- */
        #gameGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .game-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; 
            padding: 20px; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
        }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(255,255,255,0.07); }
        .game-card h3 { font-family: 'Orbitron'; font-size: 1rem; color: var(--primary); margin: 0 0 15px; line-height: 1.4; height: 3em; overflow: hidden; }
        .card-meta { font-size: 0.85rem; color: #888; display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; }
        .card-meta b { color: var(--accent); }

        /* --- Details View --- */
        #detailsView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,8,0.98);
            z-index: 1000; display: none; overflow-y: auto; padding: 40px 0;
        }
        .details-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .close-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 20px; cursor: pointer; font-family: 'Orbitron'; margin-bottom: 20px; }
        
        .tag { display: inline-block; background: var(--secondary); color: white; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; margin: 0 5px 10px 0; font-weight: bold; }
        
        .screenshot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 25px 0; }
        .screenshot-grid img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }

        .download-box { background: rgba(255,255,255,0.03); border: 1px solid var(--secondary); border-radius: 12px; padding: 20px; margin-top: 30px; }
        .source-title { color: var(--primary); font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .links-flex { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .dl-link { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary); color: #fff; 
            text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; transition: 0.2s;
        }
        .dl-link:hover { background: var(--primary); color: #000; }

        .loader { text-align: center; display: none; padding: 50px; font-family: 'Orbitron'; color: var(--primary); letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">VAJIRA CORE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Game Title (e.g. GTA V)...">
            <button class="btn-fetch" onclick="searchGames()">FETCH</button>
        </div>
    </header>

    <div id="loader" class="loader">SCANNING DATABASE...</div>
    <div id="gameGrid"></div>
</div>

<div id="detailsView">
    <div class="details-container">
        <button class="close-btn" onclick="closeDetails()">✕ CLOSE ACCESS</button>
        <div id="fullInfo"></div>
    </div>
</div>

<script>
    const API_KEY = 'mrhansamala-pcGAME-DB-FreeYRLKK1';
    const BASE_URL = 'https://pc-game-db.vercel.app/api';

    async function searchGames() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;

        const grid = document.getElementById('gameGrid');
        const loader = document.getElementById('loader');

        grid.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await axios.get(`${BASE_URL}/search?q=${query}&key=${API_KEY}`);
            loader.style.display = 'none';
            
            res.data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => getGameInfo(game.link);
                card.innerHTML = `
                    <h3>${game.title}</h3>
                    <div class="card-meta">
                        <span>BY: <b>${game.author}</b></span>
                        <span>${game.date}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            loader.innerHTML = "ERROR: SYSTEM OFFLINE";
        }
    }

    async function getGameInfo(url) {
        const detailsView = document.getElementById('detailsView');
        const infoDiv = document.getElementById('fullInfo');
        
        detailsView.style.display = 'block';
        infoDiv.innerHTML = `<h2 class="loader" style="display:block">DECRYPTING PACKETS...</h2>`;

        try {
            const res = await axios.get(`${BASE_URL}/info?url=${url}&key=${API_KEY}`);
            const d = res.data;

            infoDiv.innerHTML = `
                <h1 style="color:var(--primary); font-family:'Orbitron'; margin:0 0 10px;">${d.title}</h1>
                <div style="margin-bottom:20px;">
                    ${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                
                <div class="screenshot-grid">
                    ${d.screenshots.map(s => `<img src="${s}" onerror="this.style.display='none'">`).join('')}
                </div>

                <div class="download-box">
                    <h2 style="font-family:'Orbitron'; color:var(--accent); margin-top:0;">SECURE DOWNLOAD NODES</h2>
                    ${d.torrents.map(source => `
                        <div class="source-group">
                            <div class="source-title">${source.text.split('\n')[0]}</div>
                            <div class="links-flex">
                                ${source.links.map(l => `<a href="${l.link}" target="_blank" class="dl-link">${l.text}</a>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        } catch (e) {
            infoDiv.innerHTML = `<h2 style="color:red">FAILED TO RETRIEVE DATA</h2>`;
        }
    }

    function closeDetails() {
        document.getElementById('detailsView').style.display = 'none';
    }

    // Auto-load "gta" on start for Vajira Core style
    window.onload = () => {
        document.getElementById('searchInput').value = 'gta';
        searchGames();
    };
</script>

</body>
</html>
