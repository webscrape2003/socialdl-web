<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEVAULT | Pro PC Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #00ffcc;
            --bg: #0a0a0c;
            --card: #141417;
            --border: rgba(255,255,255,0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #eee;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; width: 100%; }

        /* Navbar/Search */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 800; letter-spacing: -1px; color: var(--accent); margin-bottom: 5px; }
        
        .search-box {
            display: flex;
            background: var(--card);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Grid */
        #gameGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover { border-color: var(--accent); background: #1c1c21; }
        .game-card span { font-size: 12px; color: var(--accent); font-weight: 600; }
        .game-card h3 { margin: 10px 0; font-size: 18px; line-height: 1.4; }
        .game-card small { color: #888; display: block; }

        /* Detail View */
        #detailView { display: none; background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .back-btn { margin-bottom: 20px; display: inline-block; color: var(--accent); cursor: pointer; font-weight: 600; }
        
        .hero-info { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 768px) { .hero-info { grid-template-columns: 1fr; } }

        .tag { background: var(--glass); padding: 5px 12px; border-radius: 6px; font-size: 12px; margin: 3px; display: inline-block; border: 1px solid var(--border); }
        
        .screenshot-grid { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            margin: 20px 0;
            padding-bottom: 10px;
        }
        .screenshot-grid img { height: 150px; border-radius: 10px; border: 1px solid var(--border); }

        .dl-section { margin-top: 30px; }
        .dl-group { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 15px; border-left: 4px solid var(--accent); }
        .dl-group h4 { margin: 0 0 10px 0; font-size: 15px; color: #fff; }
        .link-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .link-item { 
            background: #222; 
            color: #ddd; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 5px; 
            font-size: 13px; 
        }
        .link-item:hover { background: var(--accent); color: black; }

        .loader { 
            display: none; 
            width: 40px; height: 40px; 
            border: 4px solid var(--glass); 
            border-top: 4px solid var(--accent); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GAME<span style="color:white">VAULT</span></h1>
        <p style="color:#666">Ultimate PC Games Database</p>
    </div>

    <div id="searchView">
        <div class="search-box">
            <input type="text" id="gameInput" placeholder="Enter game name (e.g. GTA 5)...">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </div>
        <div class="loader" id="loader"></div>
        <div id="gameGrid" style="margin-top: 30px;"></div>
    </div>

    <div id="detailView">
        <div class="back-btn" onclick="closeDetails()"><i class="fa-solid fa-arrow-left"></i> Back to results</div>
        <h2 id="gTitle" style="margin-top:0"></h2>
        
        <div id="gTags" style="margin-bottom:20px"></div>
        
        <div class="screenshot-grid" id="gScreens"></div>

        <div id="gMeta" style="color:#aaa; font-size:14px; line-height:1.6"></div>

        <div class="dl-section">
            <h3 style="color:var(--accent)"><i class="fa-solid fa-download"></i> Download Links</h3>
            <div id="gLinks"></div>
        </div>
    </div>
</div>

<script>
    const KEY = "mrhansamala-pcGAME-DB-FreeYRLKK1";
    const BASE_URL = "https://pc-game-db.vercel.app/api";
    // Proxy for CORS if needed: https://cors-anywhere.herokuapp.com/
    
    document.getElementById('searchBtn').addEventListener('click', searchGames);
    document.getElementById('gameInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') searchGames();
    });

    async function searchGames() {
        const query = document.getElementById('gameInput').value;
        if(!query) return;

        toggleLoader(true);
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";

        try {
            const res = await fetch(`${BASE_URL}/search?q=${encodeURIComponent(query)}&key=${KEY}`);
            const data = await res.json();

            if(!data || data.length === 0) {
                grid.innerHTML = `<p style="text-align:center; width:100%">No games found for "${query}"</p>`;
            } else {
                data.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <span>${game.date}</span>
                        <h3>${game.title}</h3>
                        <small>Uploaded by: ${game.author}</small>
                    `;
                    card.onclick = () => fetchDetails(game.link);
                    grid.appendChild(card);
                });
            }
        } catch (e) {
            alert("API Error. Please try again.");
        }
        toggleLoader(false);
    }

    async function fetchDetails(gameUrl) {
        toggleLoader(true);
        try {
            const res = await fetch(`${BASE_URL}/info?url=${encodeURIComponent(gameUrl)}&key=${KEY}`);
            const g = await res.json();

            document.getElementById('gTitle').innerText = g.title;
            
            // Render Tags
            document.getElementById('gTags').innerHTML = g.tags.map(t => `<span class="tag">${t}</span>`).join('');
            
            // Render Screenshots
            document.getElementById('gScreens').innerHTML = g.screenshots.map(img => `<img src="${img}" onerror="this.style.display='none'">`).join('');

            // Render Meta/Desc
            document.getElementById('gMeta').innerHTML = `
                <p><b>Release Date:</b> ${g.meta.date} | <b>Repacker:</b> ${g.meta.author}</p>
                <div style="margin-top:15px">${g.description.join('<br>')}</div>
            `;

            // Render Torrent/File Links
            const linkBox = document.getElementById('gLinks');
            linkBox.innerHTML = g.torrents.map(group => `
                <div class="dl-group">
                    <h4>${group.text.split('\n')[0]}</h4>
                    <div class="link-list">
                        ${group.links.map(l => `<a href="${l.link}" target="_blank" class="link-item">${l.text}</a>`).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('searchView').style.display = "none";
            document.getElementById('detailView').style.display = "block";
            window.scrollTo(0,0);
        } catch (e) {
            alert("Error fetching game details.");
        }
        toggleLoader(false);
    }

    function closeDetails() {
        document.getElementById('searchView').style.display = "block";
        document.getElementById('detailView').style.display = "none";
    }

    function toggleLoader(show) {
        document.getElementById('loader').style.display = show ? "block" : "none";
    }
</script>

</body>
</html>
