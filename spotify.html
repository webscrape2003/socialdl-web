<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotifyStream | VajiraOfficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg: #090909;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #b3b3b3;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header i { color: var(--spotify-green); font-size: 2rem; margin-bottom: 10px; }

        /* Search Section */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 15px;
            color: white;
            outline: none;
        }
        #searchBtn {
            background: var(--spotify-green);
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            color: black;
            font-weight: 800;
            cursor: pointer;
        }

        /* Results List */
        .results-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .song-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .song-item:hover { background: rgba(255,255,255,0.08); border-color: var(--spotify-green); }
        .song-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .song-info { flex: 1; }
        .song-info h4 { margin: 0; font-size: 0.9rem; }
        .song-info p { margin: 0; font-size: 0.75rem; color: var(--text-dim); }

        /* Player Section */
        #playerArea { 
            display: none; 
            margin-top: 20px; 
            text-align: center; 
            border-top: 1px solid var(--border);
            padding-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .preview-img { width: 180px; height: 180px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        audio { width: 100%; margin: 15px 0; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .dl-btn {
            display: block;
            background: white;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            margin-top: 10px;
        }

        #loader { display: none; color: var(--spotify-green); text-align: center; margin: 10px 0; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fa-brands fa-spotify"></i>
            <h2>Spotify <span style="color:var(--spotify-green)">Search</span></h2>
        </div>

        <div class="search-box">
            <input type="text" id="queryInput" placeholder="Song name or Artist...">
            <button id="searchBtn">SEARCH</button>
        </div>

        <div id="loader">⚡ SYNCING WITH SPOTIFY...</div>

        <div id="resultsArea" class="results-list">
            </div>

        <div id="playerArea">
            <img id="pImg" src="" class="preview-img">
            <h3 id="pTitle">Title</h3>
            <p id="pArtist" style="color:var(--text-dim); font-size: 0.8rem;">Artist</p>
            
            <audio id="audioPreview" controls></audio>
            
            <a id="dlLink" href="#" class="dl-btn" target="_blank">
                <i class="fa-solid fa-download"></i> DOWNLOAD MP3
            </a>
            <button onclick="closePlayer()" style="background:none; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer;">Back to search</button>
        </div>
    </div>

    <script>
        const API_KEY = "vajira-dbsonkgf46-1767792373072";

        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = document.getElementById('queryInput').value.trim();
            if(!query) return;

            showLoader(true);
            document.getElementById('resultsArea').innerHTML = "";
            document.getElementById('playerArea').style.display = "none";

            try {
                const response = await fetch(`https://vajira-official-apis.vercel.app/api/spotifysearch?apikey=${API_KEY}&query=${encodeURIComponent(query)}`);
                const data = await response.json();

                if(data.status && data.result.search_data) {
                    const list = document.getElementById('resultsArea');
                    data.result.search_data.forEach(song => {
                        const div = document.createElement('div');
                        div.className = 'song-item';
                        div.innerHTML = `
                            <img src="${song.cover_img}">
                            <div class="song-info">
                                <h4>${song.title}</h4>
                                <p>${song.artist} • ${song.duration}</p>
                            </div>
                        `;
                        div.onclick = () => fetchDetails(song.song_link);
                        list.appendChild(div);
                    });
                }
            } catch (e) { alert("Search failed"); }
            showLoader(false);
        });

        async function fetchDetails(songUrl) {
            showLoader(true);
            try {
                // Using the detail API endpoint based on your logic
                const res = await fetch(`https://vajira-official-apis.vercel.app/api/spotifydl?apikey=${API_KEY}&url=${encodeURIComponent(songUrl)}`);
                const data = await res.json();

                if(data.status) {
                    const track = data.result;
                    document.getElementById('pImg').src = track.preview.image;
                    document.getElementById('pTitle').innerText = track.preview.title;
                    document.getElementById('pArtist').innerText = track.preview.artist;
                    document.getElementById('audioPreview').src = track.preview.audio;
                    document.getElementById('dlLink').href = track.download;

                    document.getElementById('resultsArea').style.display = "none";
                    document.getElementById('playerArea').style.display = "block";
                }
            } catch (e) { alert("Error fetching song details"); }
            showLoader(false);
        }

        function closePlayer() {
            document.getElementById('resultsArea').style.display = "flex";
            document.getElementById('playerArea').style.display = "none";
            document.getElementById('audioPreview').pause();
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? "block" : "none";
        }
    </script>
</body>
</html>
