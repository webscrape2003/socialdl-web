<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVault | VajiraOfficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --accent: #e50914; /* Netflix Red */
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #a3a3a3;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
        }

        /* Search Section */
        .search-container {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 30px;
        }

        .search-group {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 1rem;
        }

        #searchBtn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.2);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .movie-card h4 {
            font-size: 0.8rem;
            padding: 10px;
            margin: 0;
            text-align: center;
            height: 40px;
            overflow: hidden;
        }

        /* Detail View */
        #detailView {
            display: none;
            background: var(--card);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--border);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .detail-layout {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .detail-poster {
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .detail-info {
            flex: 1;
            min-width: 300px;
        }

        .meta-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .meta-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .meta-list li b { color: white; }

        .dl-section {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dl-link {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #loader { display: none; color: var(--accent); margin: 20px; text-align: center; font-weight: 800; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="searchView">
            <div class="search-container">
                <i class="fa-solid fa-film" style="font-size: 2.5rem; color: var(--accent); margin-bottom: 15px;"></i>
                <h2 style="margin: 0 0 20px 0;">MOVIE <span style="color:var(--accent)">VAULT</span></h2>
                <div class="search-group">
                    <input type="text" id="movieInput" placeholder="Enter movie title (e.g. 2025)...">
                    <button id="searchBtn">SEARCH</button>
                </div>
            </div>

            <div id="loader">⚡ ACCESSING ARCHIVES...</div>
            <div id="movieGrid" class="movie-grid"></div>
        </div>

        <div id="detailView">
            <button class="back-btn" onclick="closeDetails()"><i class="fa-solid fa-arrow-left"></i> BACK</button>
            <div class="detail-layout">
                <img id="mPoster" class="detail-poster" src="">
                <div class="detail-info">
                    <h1 id="mTitle" style="margin:0"></h1>
                    <div id="mRating" style="color: #ffc107; margin-top: 5px;"></div>
                    
                    <ul class="meta-list" id="mMeta"></ul>

                    <div class="dl-section" id="dlSection">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "vajira-o0oujlyn32-1771089291985";

        document.getElementById('searchBtn').addEventListener('click', searchMovies);

        async function searchMovies() {
            const q = document.getElementById('movieInput').value.trim();
            if(!q) return;

            showLoader(true);
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = "";

            try {
                const res = await fetch(`https://vajira-official-apis.vercel.app/api/Naijaprey?apikey=${API_KEY}&q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if(data.status) {
                    data.result.forEach(movie => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.innerHTML = `
                            <img src="${movie.image}">
                            <h4>${movie.title}</h4>
                        `;
                        card.onclick = () => fetchMovieDetails(movie.link);
                        grid.appendChild(card);
                    });
                }
            } catch (e) { alert("Search Failed"); }
            showLoader(false);
        }

        async function fetchMovieDetails(url) {
            showLoader(true);
            try {
                const res = await fetch(`https://vajira-official-apis.vercel.app/api/naijapreydetails?apikey=${API_KEY}&url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if(data.status) {
                    const m = data.result;
                    document.getElementById('mPoster').src = m.image;
                    document.getElementById('mTitle').innerText = m.title;
                    
                    // Star Rating
                    const stars = "★".repeat(parseInt(m.rate)) + "☆".repeat(5 - parseInt(m.rate));
                    document.getElementById('mRating').innerText = stars + ` (${m.date})`;

                    // Meta Details (Genre, Cast, etc)
                    const metaList = document.getElementById('mMeta');
                    metaList.innerHTML = m.details.map(d => {
                        if(d.includes(':')) {
                            let parts = d.split(':');
                            return `<li><b>${parts[0]}:</b> ${parts.slice(1).join(':')}</li>`;
                        }
                        return `<li>${d}</li>`;
                    }).join('');

                    // Episodes/Download
                    const dlSection = document.getElementById('dlSection');
                    dlSection.innerHTML = m.episodes.map(ep => `
                        <a href="${ep.download}" class="dl-link" target="_blank">
                            <i class="fa-solid fa-cloud-arrow-down"></i> ${ep.episode}
                        </a>
                    `).join('');

                    document.getElementById('searchView').style.display = "none";
                    document.getElementById('detailView').style.display = "block";
                    window.scrollTo(0,0);
                }
            } catch (e) { alert("Error fetching details"); }
            showLoader(false);
        }

        function closeDetails() {
            document.getElementById('searchView').style.display = "block";
            document.getElementById('detailView').style.display = "none";
        }

        function showLoader(status) {
            document.getElementById('loader').style.display = status ? "block" : "none";
        }
    </script>
</body>
</html>
